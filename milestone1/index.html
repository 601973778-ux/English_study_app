<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>里程碑1 · 背单词</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f2ef;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --accent: #0d745e;
      --border: #e0dcd4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121412;
        --card: #1c1f1d;
        --text: #eceae6;
        --muted: #a39e96;
        --accent: #3ecfae;
        --border: #2e3330;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }
    .wrap {
      max-width: 42rem;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .word {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    .meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .meaning {
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3.2rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    button {
      font: inherit;
      cursor: pointer;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: var(--text);
    }
    .err {
      color: #b42318;
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 1rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>里程碑1：背单词（认识/不认识）</h1>
    <div class="card">
      <div class="word" id="word">点击“开始学习”</div>
      <div class="meta" id="meta"></div>
      <div class="meaning" id="meaning">中文释义会在你点击“不认识”后显示。</div>
      <div class="actions">
        <button type="button" id="start" disabled>开始学习（50词）</button>
        <button type="button" id="known" disabled>认识</button>
        <button type="button" class="secondary" id="unknown" disabled>不认识（显示中文）</button>
        <button type="button" id="nextAfterMeaning" disabled hidden>下一个</button>
      </div>
      <p class="err" id="err" hidden></p>
      <p class="hint" id="hint"></p>
    </div>
  </div>
  <script>
    const DATA_URL = "/DictionaryByGPT4-main/gptwords.json";

    const elWord = document.getElementById("word");
    const elMeta = document.getElementById("meta");
    const elMeaning = document.getElementById("meaning");
    const elErr = document.getElementById("err");
    const elHint = document.getElementById("hint");
    const btnStart = document.getElementById("start");
    const btnKnown = document.getElementById("known");
    const btnUnknown = document.getElementById("unknown");
    const btnNextAfterMeaning = document.getElementById("nextAfterMeaning");

    /** @type {{ words: string, content: string }[]} */
    let entries = [];
    let session = [];
    let index = 0;
    let knownCount = 0;
    let unknownCount = 0;
    let waitingNextAfterMeaning = false;
    const SESSION_SIZE = 50;

    function parseJsonl(text) {
      const out = [];
      for (const line of text.split(/\r?\n/)) {
        const t = line.trim();
        if (!t) continue;
        try {
          const o = JSON.parse(t);
          if (!o) continue;
          const words = typeof o.words === "string" ? o.words : (typeof o.word === "string" ? o.word : "");
          if (words) {
            out.push({
              words,
              content: typeof o.content === "string" ? o.content : "",
            });
          }
        } catch (_) { /* skip bad line */ }
      }
      return out;
    }

    function pickRandom(items, count) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, Math.min(count, copy.length));
    }

    function showCurrentWord() {
      const current = session[index];
      if (!current) return;
      elWord.textContent = current.words;
      elMeaning.textContent = "中文释义会在你点击“不认识”后显示。";
      elMeta.textContent = `第 ${index + 1} / ${session.length} 个 | 认识 ${knownCount} | 不认识 ${unknownCount}`;
      waitingNextAfterMeaning = false;
      btnNextAfterMeaning.hidden = true;
      btnNextAfterMeaning.disabled = true;
      btnKnown.disabled = false;
      btnUnknown.disabled = false;
    }

    function finishSession() {
      elWord.textContent = "本次学习完成";
      elMeaning.textContent = "你可以点击“开始学习”开启下一轮 50 词。";
      elMeta.textContent = `总计 ${session.length} 个 | 认识 ${knownCount} | 不认识 ${unknownCount}`;
      btnKnown.disabled = true;
      btnUnknown.disabled = true;
      btnNextAfterMeaning.hidden = true;
      btnNextAfterMeaning.disabled = true;
      btnStart.disabled = false;
    }

    function nextWord() {
      index += 1;
      if (index >= session.length) {
        finishSession();
        return;
      }
      showCurrentWord();
    }

    function showError(msg) {
      elErr.hidden = false;
      elErr.textContent = msg;
      elWord.textContent = "无法加载";
      elMeaning.textContent = "";
      elMeta.textContent = "";
      btnStart.disabled = true;
      btnKnown.disabled = true;
      btnUnknown.disabled = true;
      btnNextAfterMeaning.hidden = true;
      btnNextAfterMeaning.disabled = true;
    }

    async function load() {
      elHint.textContent = "";
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        entries = parseJsonl(text);
        if (!entries.length) throw new Error("词表为空或格式不对");
        btnStart.disabled = false;
        elMeta.textContent = `词库加载成功，共 ${entries.length} 条`;
      } catch (e) {
        showError(e instanceof Error ? e.message : String(e));
        elHint.innerHTML =
          "请在本目录运行 <code>python serve_milestone1.py</code>，浏览器打开提示的地址（不要直接用 file:// 打开本页）。";
      }
    }

    btnStart.addEventListener("click", () => {
      session = pickRandom(entries, SESSION_SIZE);
      index = 0;
      knownCount = 0;
      unknownCount = 0;
      btnStart.disabled = true;
      btnKnown.disabled = false;
      btnUnknown.disabled = false;
      btnNextAfterMeaning.hidden = true;
      btnNextAfterMeaning.disabled = true;
      showCurrentWord();
    });

    btnKnown.addEventListener("click", () => {
      if (waitingNextAfterMeaning) return;
      if (!session.length || index >= session.length) return;
      knownCount += 1;
      nextWord();
    });

    btnUnknown.addEventListener("click", () => {
      if (waitingNextAfterMeaning) return;
      if (!session.length || index >= session.length) return;
      unknownCount += 1;
      const current = session[index];
      elMeaning.textContent = `词义：${current.content || "（暂无词义）"}`;
      waitingNextAfterMeaning = true;
      btnKnown.disabled = true;
      btnUnknown.disabled = true;
      btnNextAfterMeaning.hidden = false;
      btnNextAfterMeaning.disabled = false;
    });

    btnNextAfterMeaning.addEventListener("click", () => {
      if (!waitingNextAfterMeaning) return;
      nextWord();
    });

    load();
  </script>
</body>
</html>
